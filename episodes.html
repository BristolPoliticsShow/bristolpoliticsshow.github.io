permalink: /episodes
order: 4

<article class="ep-page">
  <div class="ep-wrap">
    <h1 class="ep-heading">Past Shows</h1>
    <p class="ep-intro">Each week has the full show plus Tony's full-length interviews and clips. Tap a week to open it, then play any item here or download it to keep.</p>

    <p id="ep-status" class="ep-status">Loading the archive…</p>
    <div id="ep-weeks"></div>
    <p id="ep-updated" class="ep-updated"></p>
  </div>
</article>

<style>
.ep-page { background-color: #030102; min-height: 100vh; padding: 2.5rem 1rem 4rem; }
.ep-wrap { max-width: 720px; margin: 0 auto; }
.ep-heading { color: #fff; font-size: 2.2rem; margin-bottom: 0.4rem; }
.ep-intro { color: rgba(255,255,255,0.75); font-size: 1.15rem; line-height: 1.5; margin-bottom: 2rem; }
.ep-status { color: rgba(255,255,255,0.7); font-size: 1.15rem; }

.ep-week { background-color: #0b0607; border-radius: 14px; margin-bottom: 1rem; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
.ep-week > summary {
  list-style: none; cursor: pointer; padding: 1.2rem 1.4rem;
  color: #ffd166; font-size: 1.3rem; font-weight: 700;
  display: flex; align-items: center; justify-content: space-between;
}
.ep-week > summary::-webkit-details-marker { display: none; }
.ep-week > summary .ep-count { color: rgba(255,255,255,0.5); font-size: 0.95rem; font-weight: 400; }
.ep-week > summary::after { content: "▸"; color: rgba(255,255,255,0.5); margin-left: 0.75rem; }
.ep-week[open] > summary::after { content: "▾"; }

.ep-item { padding: 1rem 1.4rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); }
.ep-item-name { color: #fff; font-size: 1.1rem; line-height: 1.45; margin-bottom: 0.6rem; }
.ep-badge {
  display: inline-block; background: #c84b54; color: #fff; font-size: 0.75rem;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 0.15rem 0.5rem; border-radius: 6px; margin-right: 0.5rem; vertical-align: middle;
}
.ep-item audio { width: 100%; height: 50px; filter: invert(92%); }

.ep-updated { color: rgba(255,255,255,0.4); font-size: 0.95rem; text-align: center; margin-top: 2rem; }
@media (max-width: 576px) { .ep-heading { font-size: 1.9rem; } .ep-week > summary { font-size: 1.15rem; } }
</style>

<script>
(function () {
  var statusEl = document.getElementById('ep-status');
  var weeksEl = document.getElementById('ep-weeks');
  var updatedEl = document.getElementById('ep-updated');

  fetch('/audio.json?t=' + Date.now())
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) {
      var weeks = (data && data.weeks) || [];
      if (!weeks.length) { statusEl.textContent = 'No shows available right now.'; return; }
      statusEl.style.display = 'none';

      weeks.forEach(function (week, wi) {
        var det = document.createElement('details');
        det.className = 'ep-week';
        if (wi === 0) det.open = true;

        var sum = document.createElement('summary');
        var label = document.createElement('span');
        label.textContent = week.date || 'Show';
        var count = document.createElement('span');
        count.className = 'ep-count';
        count.textContent = week.items.length + (week.items.length === 1 ? ' item' : ' items');
        sum.appendChild(label);
        sum.appendChild(count);
        det.appendChild(sum);

        week.items.forEach(function (it) {
          var item = document.createElement('div');
          item.className = 'ep-item';
          var nm = document.createElement('div');
          nm.className = 'ep-item-name';
          if (it.isFullShow) {
            var badge = document.createElement('span');
            badge.className = 'ep-badge';
            badge.textContent = 'Full show';
            nm.appendChild(badge);
            nm.appendChild(document.createTextNode(week.date || ''));
          } else {
            nm.textContent = it.name;
          }
          item.appendChild(nm);

          var label = it.isFullShow ? ((week.date || '') + ' — Full show') : it.name;
          var dlName = it.isFullShow ? ((week.date || '') + ' Bristol Politics Show') : it.name;

          var actions = document.createElement('div');
          actions.className = 'bps-actions';
          actions.appendChild(window.bpsPlayButton(it.url, label));
          actions.appendChild(window.bpsDownloadLink(it.url, dlName));
          item.appendChild(actions);

          det.appendChild(item);
        });

        weeksEl.appendChild(det);
      });

      if (data.updated) {
        var when = new Date(data.updated);
        if (!isNaN(when)) {
          updatedEl.textContent = 'Archive updated ' + when.toLocaleDateString('en-GB',
            { day: 'numeric', month: 'long', year: 'numeric' });
        }
      }
    })
    .catch(function () {
      statusEl.textContent = "Sorry, the archive couldn't be loaded right now. Please try again later.";
    });
})();
</script>
