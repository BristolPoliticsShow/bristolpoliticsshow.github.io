name: Update Content

on:
  schedule:
    # Hourly, so new shows and interview clips appear on the website soon after
    # Tony posts them to Radio4All (the app reads Radio4All live; this keeps the
    # static site close behind). Only commits when the content actually changed.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install beautifulsoup4

    - name: Build content JSON from the RSS feed
      run: python3 scripts/build_content.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add audio.json thisweek.json stories.json
        git diff --staged --quiet || git commit -m "Update show content"
        git push
