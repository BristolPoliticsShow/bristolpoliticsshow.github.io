name: Update Content

on:
  schedule:
    # Frugal, content-aware schedule: check often only when new content actually
    # lands, rather than every hour all week (which mostly found nothing).
    # Times are UTC. Only commits when the content has changed. Use the
    # "Run workflow" button (workflow_dispatch) any time for an instant refresh.
    - cron: "0 21,22,23 * * 5"        # Fri evening — the new show is posted (~11pm UK)
    - cron: "0 8,11,14,17,20 * * 6,0"  # Sat & Sun — interview clips trickle in
    - cron: "30 9,17 * * 1-4"          # Mon–Thu, twice a day — late clips & story updates
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install beautifulsoup4

    - name: Build content JSON from the RSS feed
      run: python3 scripts/build_content.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add audio.json thisweek.json stories.json
        git diff --staged --quiet || git commit -m "Update show content"
        git push
