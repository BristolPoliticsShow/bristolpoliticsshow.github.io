<article class="sr-page">
  <div class="sr-wrap">
    <h1 class="sr-heading">Search</h1>

    <input id="sr-input" class="sr-input" type="search" inputmode="search"
           autocomplete="off" placeholder="Type a topic or name…" disabled>

    <p id="sr-status" class="sr-status">Loading the archive…</p>
    <div id="sr-results"></div>
  </div>
</article>

<style>
.sr-page { background-color: #030102; min-height: 100vh; padding: 2.5rem 1rem 4rem; }
.sr-wrap { max-width: 720px; margin: 0 auto; }
.sr-heading { color: #fff; font-size: 2.2rem; margin-bottom: 1.25rem; }

.sr-input { width: 100%; box-sizing: border-box; padding: 1rem 1.25rem; font-size: 1.25rem; border-radius: 999px; border: 2px solid rgba(255,255,255,0.18); background-color: #15100f; color: #fff; outline: none; margin-bottom: 1.5rem; }
.sr-input::placeholder { color: rgba(255,255,255,0.45); }
.sr-input:focus { border-color: #c84b54; }

.sr-status { color: rgba(255,255,255,0.6); font-size: 1.15rem; text-align: center; margin-top: 2rem; }

.sr-card { background-color: #0b0607; border-radius: 14px; padding: 1.25rem 1.5rem 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.sr-date { color: #ffd166; font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
.sr-badge { display: inline-block; background: #c84b54; color: #fff; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.12rem 0.45rem; border-radius: 6px; margin-right: 0.5rem; vertical-align: middle; }
.sr-name { color: #fff; font-size: 1.1rem; line-height: 1.45; margin-bottom: 0.8rem; }
.sr-card audio { width: 100%; height: 50px; filter: invert(92%); }

@media (max-width: 576px) { .sr-heading { font-size: 1.9rem; } }
</style>

<script>
(function () {
  var input = document.getElementById('sr-input');
  var statusEl = document.getElementById('sr-status');
  var resultsEl = document.getElementById('sr-results');
  var items = [];

  function render(list, query) {
    resultsEl.innerHTML = '';
    if (!query) {
      statusEl.style.display = 'block';
      statusEl.textContent = 'Type above to search ' + items.length + ' shows and interviews.';
      return;
    }
    if (!list.length) {
      statusEl.style.display = 'block';
      statusEl.textContent = 'Nothing matches “' + query + '”. Try another word.';
      return;
    }
    statusEl.style.display = 'none';
    list.forEach(function (it) {
      var card = document.createElement('div');
      card.className = 'sr-card';

      if (it.date) {
        var d = document.createElement('div');
        d.className = 'sr-date';
        d.textContent = it.date;
        card.appendChild(d);
      }
      var nm = document.createElement('div');
      nm.className = 'sr-name';
      if (it.isFullShow) {
        var badge = document.createElement('span');
        badge.className = 'sr-badge';
        badge.textContent = 'Full show';
        nm.appendChild(badge);
        nm.appendChild(document.createTextNode(it.date || 'Full show'));
      } else {
        nm.textContent = it.name;
      }
      card.appendChild(nm);

      var label = it.isFullShow ? ((it.date || '') + ' — Full show') : it.name;
      var dlName = it.isFullShow ? ((it.date || '') + ' Bristol Politics Show') : it.name;

      var actions = document.createElement('div');
      actions.className = 'bps-actions';
      actions.appendChild(window.bpsPlayButton(it.url, label));
      actions.appendChild(window.bpsDownloadLink(it.url, dlName));
      card.appendChild(actions);

      resultsEl.appendChild(card);
    });
  }

  function onInput() {
    var q = input.value.trim().toLowerCase();
    if (!q) { render([], ''); return; }
    var matches = items.filter(function (it) {
      return (it.name || '').toLowerCase().indexOf(q) !== -1 ||
             (it.date || '').toLowerCase().indexOf(q) !== -1;
    });
    render(matches, input.value.trim());
  }

  fetch('/audio.json?t=' + Date.now())
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) {
      (data.weeks || []).forEach(function (w) {
        (w.items || []).forEach(function (it) {
          items.push({ name: it.name, url: it.url, isFullShow: it.isFullShow, date: w.date });
        });
      });
      input.disabled = false;
      input.addEventListener('input', onInput);
      render([], '');
    })
    .catch(function () {
      statusEl.textContent = "Sorry, search couldn't be loaded right now. Please try again later.";
    });
})();
</script>
