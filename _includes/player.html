<div id="bps-player" class="bps-player" hidden>
  <div class="bps-player-inner">
    <button class="bps-close" id="bps-close" type="button" aria-label="Close player">×</button>
    <div class="bps-title" id="bps-title"></div>
    <div class="bps-controls">
      <span class="bps-time" id="bps-cur">0:00</span>
      <button class="bps-skip" id="bps-back" type="button" aria-label="Back 10 seconds">−10s</button>
      <button class="bps-toggle" id="bps-toggle" type="button" aria-label="Play"></button>
      <button class="bps-skip" id="bps-fwd" type="button" aria-label="Forward 10 seconds">+10s</button>
      <span class="bps-time" id="bps-rem">0:00</span>
    </div>
    <input class="bps-seek" id="bps-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek position">
  </div>
  <audio id="bps-audio" preload="none"></audio>
</div>

<style>
.bps-playbtn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background-color: #c84b54; color: #fff; border: none; cursor: pointer;
  font-size: 1.15rem; font-weight: 700; padding: 0.7rem 1.5rem; border-radius: 999px;
}
.bps-playbtn:hover, .bps-playbtn:focus { background-color: #d96069; outline: none; }
.bps-playbtn.is-playing { background-color: #3a3a3a; }

.bps-ic { width: 1.15em; height: 1.15em; fill: currentColor; flex: none; }
.bps-toggle .bps-ic { width: 1.7rem; height: 1.7rem; }

.bps-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
.bps-dl {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: #fff; border: 2px solid rgba(255,255,255,0.3); background: transparent;
  font-size: 1.05rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 999px;
  text-decoration: none;
}
.bps-dl:hover, .bps-dl:focus { background: rgba(255,255,255,0.08); color: #fff; text-decoration: none; }

.bps-player {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 1000;
  background: #1a1210; border-top: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 -8px 28px rgba(0,0,0,0.55);
}
.bps-player[hidden] { display: none; }
.bps-player-inner { max-width: 720px; margin: 0 auto; padding: 0.9rem 1.25rem 1.1rem; position: relative; }

.bps-close {
  position: absolute; top: 0.5rem; right: 0.75rem; background: none; border: none;
  color: rgba(255,255,255,0.6); font-size: 1.6rem; line-height: 1; cursor: pointer; padding: 0.25rem;
}
.bps-title {
  color: #fff; font-size: 1.05rem; line-height: 1.3; margin: 0 2rem 0.75rem 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bps-controls { display: flex; align-items: center; justify-content: center; gap: 1rem; }
.bps-time { color: rgba(255,255,255,0.7); font-size: 0.95rem; font-variant-numeric: tabular-nums; min-width: 58px; }
.bps-time:last-child { text-align: right; }
.bps-skip {
  background: none; border: none; color: #fff; font-size: 1rem; font-weight: 700;
  cursor: pointer; padding: 0.4rem; opacity: 0.85; flex: none; white-space: nowrap;
}
.bps-skip:hover { opacity: 1; }
.bps-toggle {
  background: #c84b54; color: #fff; border: none; cursor: pointer;
  width: 60px; height: 60px; border-radius: 50%; font-size: 1.6rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex: none;  /* never shrink — keep it a perfect circle */
}
.bps-toggle:hover { background: #d96069; }
.bps-seek { width: 100%; margin-top: 0.9rem; accent-color: #c84b54; height: 24px; }
</style>

<script>
(function () {
  var audio = document.getElementById('bps-audio');
  var bar = document.getElementById('bps-player');
  var titleEl = document.getElementById('bps-title');
  var toggle = document.getElementById('bps-toggle');
  var curEl = document.getElementById('bps-cur');
  var remEl = document.getElementById('bps-rem');
  var seek = document.getElementById('bps-seek');
  var currentUrl = null;
  var activeBtn = null;
  var seeking = false;

  var IC = {
    play: '<svg class="bps-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>',
    pause: '<svg class="bps-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>',
    dl: '<svg class="bps-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 1 1 1.41 1.42l-5 5a1 1 0 0 1-1.42 0l-5-5a1 1 0 1 1 1.42-1.42l3.29 3.3V4a1 1 0 0 1 1-1z"/><path d="M5 19h14a1 1 0 0 1 0 2H5a1 1 0 0 1 0-2z"/></svg>'
  };

  function fmt(t) {
    if (!isFinite(t) || t < 0) t = 0;
    t = Math.floor(t);
    var h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
    var mm = (h > 0 && m < 10 ? '0' : '') + m;
    var ss = (s < 10 ? '0' : '') + s;
    return (h > 0 ? h + ':' : '') + mm + ':' + ss;
  }

  function setBtnLabel(playing) {
    if (!activeBtn) return;
    activeBtn.innerHTML = (playing ? IC.pause + '<span>Pause</span>' : IC.play + '<span>Play</span>');
    activeBtn.classList.toggle('is-playing', playing);
  }

  // Cloudflare Worker that re-serves Radio4All files with a "save this"
  // (Content-Disposition: attachment) header, so Download pops a real save
  // dialog on every browser. Source: cloudflare-worker/download-proxy.js
  var DOWNLOAD_PROXY = 'https://holy-frost-886b.paxford.workers.dev';

  window.bpsDownloadLink = function (url, filename) {
    var clean = (filename || 'show').replace(/[\\/:*?"<>|]+/g, ' ').replace(/\s+/g, ' ').trim();
    var fname = clean.slice(0, 90) + '.mp3';
    var a = document.createElement('a');
    a.className = 'bps-dl';
    a.href = DOWNLOAD_PROXY + '/?url=' + encodeURIComponent(url) + '&name=' + encodeURIComponent(fname);
    a.setAttribute('download', fname);
    a.rel = 'noopener';
    a.innerHTML = IC.dl + '<span>Download</span>';
    if (window.gtag) {
      a.addEventListener('click', function () { gtag('event', 'download_audio', { audio_title: filename || url }); });
    }
    return a;
  };

  // Create a styled Play button wired to the docked player.
  window.bpsPlayButton = function (url, title) {
    var btn = document.createElement('button');
    btn.className = 'bps-playbtn';
    btn.type = 'button';
    btn.innerHTML = IC.play + '<span>Play</span>';
    btn.addEventListener('click', function () { window.bpsPlay(url, title, btn); });
    return btn;
  };

  window.bpsPlay = function (url, title, btn) {
    if (currentUrl === url) {
      if (audio.paused) audio.play(); else audio.pause();
      return;
    }
    if (activeBtn && activeBtn !== btn) {
      activeBtn.innerHTML = IC.play + '<span>Play</span>';
      activeBtn.classList.remove('is-playing');
    }
    activeBtn = btn || null;
    currentUrl = url;
    titleEl.textContent = title || '';
    audio.src = url;
    bar.hidden = false;
    document.body.style.paddingBottom = bar.offsetHeight + 'px';
    audio.play();
    if (window.gtag) gtag('event', 'play_audio', { audio_title: title || url });
  };

  toggle.addEventListener('click', function () {
    if (!currentUrl) return;
    if (audio.paused) audio.play(); else audio.pause();
  });
  document.getElementById('bps-back').addEventListener('click', function () {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });
  document.getElementById('bps-fwd').addEventListener('click', function () {
    audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
  });
  document.getElementById('bps-close').addEventListener('click', function () {
    audio.pause();
    bar.hidden = true;
    document.body.style.paddingBottom = '';
    setBtnLabel(false);
    activeBtn = null;
    currentUrl = null;
  });

  seek.addEventListener('input', function () { seeking = true; });
  seek.addEventListener('change', function () {
    if (audio.duration) audio.currentTime = (seek.value / 1000) * audio.duration;
    seeking = false;
  });

  audio.addEventListener('play', function () { toggle.innerHTML = IC.pause; toggle.setAttribute('aria-label', 'Pause'); setBtnLabel(true); });
  audio.addEventListener('pause', function () { toggle.innerHTML = IC.play; toggle.setAttribute('aria-label', 'Play'); setBtnLabel(false); });
  audio.addEventListener('timeupdate', function () {
    curEl.textContent = fmt(audio.currentTime);
    var dur = audio.duration;
    remEl.textContent = isFinite(dur) ? '-' + fmt(dur - audio.currentTime) : '';
    if (!seeking && dur) seek.value = Math.round((audio.currentTime / dur) * 1000);
  });
  audio.addEventListener('ended', function () { setBtnLabel(false); });

  toggle.innerHTML = IC.play;
})();
</script>
